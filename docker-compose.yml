version: '3.8'

services:
  api:
    build: .
    restart: always
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  bot:
    build: .
    restart: always
    env_file:
      - .env
    command: python -m app.runtime.bot_entrypoint
    depends_on:
      - api

  worker:
    build: .
    restart: always
    env_file:
      - .env
    command: python -m app.runtime.worker_entrypoint
    depends_on:
      - api
